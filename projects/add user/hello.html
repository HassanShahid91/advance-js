<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0e0e0e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 40px;
    }

    .form-container {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: #fff;
    }

    .form-group textarea {
      resize: none;
      height: 70px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .card img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .card h3 {
      margin-bottom: 5px;
    }

    .card p.role {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .card p.bio {
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Add User</h2>

    <div class="form-group">
      <label>Name</label>
      <input type="text" value="Harsh">
    </div>

    <div class="form-group">
      <label>Role</label>
      <input type="text" value="Developer">
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea>I love teaching and making stuff</textarea>
    </div>

    <div class="form-group">
      <label>Photo URL</label>
      <input type="text" value="https://randomuser.me/api/portraits/men/32.jpg">
    </div>

    <button class="btn">Submit</button>
  </div>

  <div class="cards">
    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="">
      <h3>John Doe</h3>
      <p class="role">Frontend Developer</p>
      <p class="bio">Loves building beautiful UIs and learning new technologies.</p>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/2.jpg" alt="">
      <h3>Jane Smith</h3>
      <p class="role">Backend Engineer</p>
      <p class="bio">Enjoys solving complex problems and optimizing APIs.</p>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/3.jpg" alt="">
      <h3>Alex Lee</h3>
      <p class="role">UI/UX Designer</p>
      <p class="bio">Passionate about user experience and clean design.</p>
    </div>
  </div>

</body>
</html>
